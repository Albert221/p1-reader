substitutions:
  device_name: p1reader
  friendly_name: P1 Reader

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/Albert221/dsmr-custom.git
      ref: BAJO_STOEN
    components: [ dsmr_custom ]

api:

ota:
  - platform: esphome

logger:
  baud_rate: 0
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: ${device_name}
    password: ${device_name}

captive_portal:

uart:
  id: uart_dsmr
  rx_pin:
    number: GPIO20
    inverted: true
  baud_rate: 115200
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 4096
  # debug:

dsmr_custom:
  id: dsmr_hub
  uart_id: uart_dsmr
  decryption_key: !secret p1_decryption_key
  method: Poland_STOEN
  max_telegram_length: 4096
  crc_check: false

  custom_obis_sensors:
    - code: "0-0:1.0.0"  
      name: "1.0.0 Timestamp"
      type: text_sensor      
      internal: false

    - code: "1-0:1.8.0"
      name: "1.8.0 Positive active energy total"
      type: sensor
      internal: false
      unit_of_measurement: "kWh"
      accuracy_decimals: 3
      device_class: energy
      state_class: total_increasing

    - code: "1-0:1.7.0"  
      name: "1.7.0 Positive active instantaneous power"
      type: sensor
      internal: false
      unit_of_measurement: "kW"
      accuracy_decimals: 3
      device_class: power
      state_class: measurement

status_led:
  pin: GPIO3

sensor:
  - platform: wifi_signal
    id: sensor_wifi_signal
    name: "${friendly_name} WiFi signal"
    update_interval: 300s

